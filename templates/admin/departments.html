{% extends "base.html" %}

{% block content %}
    <h2>Departments</h2>
    {% if departments %}
        <table class="table table-striped table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for d in departments %}
                <tr>
                    <td>{{ d.id }}</td>
                    <td>{{ d.name }}</td>
                    <td>
                        <form method="POST" action="/admin/departments/delete/{{ d.id }}">
                            <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    {% else %}
        <p class="text-muted">No departments available.</p>
    {% endif %}

    <div class="card mt-4 p-4" style="max-width: 400px;">
        <h4>Add Department</h4>
        <form method="POST" action="/admin/departments">
            <div class="mb-3">
                <input class="form-control" name="name" placeholder="Department name" required>
            </div>
            <button type="submit" class="btn btn-primary">Add Department</button>
        </form>
    </div>
{% endblock %}
